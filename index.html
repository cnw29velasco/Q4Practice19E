<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4Practice1</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body>
    <h1>Javascript Conditional Statements</h1>
    <!--comment-->

    <input type="text" id="Age" class="form-control" placeholder="type here">

    <button class="btn bt-info" onclick="checkAge()">Check</button>

    <script>


    function checkAge(){
        var age = document.getElementById("Age").value;

        if(isNaN(age) || age < 0){

            alert("Please input a valid number");

        }

        else if(age < 18){

            alert("You are underage");

        }

        else if(age > 18){

            alert("You are of legal age");

        }

        else{

            alert("Please indicate your age");
        }

        }
    </script>
</body>
</html>
